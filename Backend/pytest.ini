# pytest.ini
[pytest]
# Show descriptive test output using testdox
addopts = --tb=short -ra 
# Make sure Python warnings are visible (optional, helps debugging)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Optional: set a minimum pytest version
minversion = 7.0

# Exclude load_tests directory from collection
testpaths = tests
norecursedirs = load_tests

# Optional: mark known test categories (you can add more later)
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    security: marks tests as security tests
    performance: marks tests as performance tests
    api: marks tests as API tests
    database: marks tests as database tests
    regression: marks tests as regression tests
    e2e: marks tests as end-to-end tests


    
