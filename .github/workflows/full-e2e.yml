name: Full End-to-End Tests

on:
  push:
    branches: [ main, feature/reactapp-integration ]
  pull_request:
    branches: [ main, feature/reactapp-integration ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  BACKEND_DIR: 'Backend'
  FRONTEND_DIR: 'admin_react_app'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 – Backend Tests (SQLite, no DB service needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('Backend/app/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install Python dependencies
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install coverage

    - name: Create test-results directory
      working-directory: ${{ env.BACKEND_DIR }}
      run: mkdir -p test-results

    - name: Run all tests
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        python -m pytest tests/ \
          -v --tb=short \
          --junitxml=test-results/results.xml \
          --html=test-results/results.html \
          --self-contained-html \
          --cov=app \
          --cov-report=xml:test-results/coverage.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results
        path: ${{ env.BACKEND_DIR }}/test-results/
        retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 – Frontend Tests (build + Playwright smoke tests)
# ─────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

    - name: Install dependencies
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm ci

    - name: Build application
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm run build

    # Browser Playwright runs live in the End-to-End Integration job (with a
    # real backend). This job stays fast: dependency install + production build.

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 – End-to-End Integration (backend + frontend together)
# ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: End-to-End Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # Browser integration is intentionally manual; push/PR CI validates the
    # frontend build, backend tests, Docker health, and Android build quickly.
    if: github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

    - name: Install backend dependencies
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Install frontend dependencies
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm ci

    - name: Install Playwright chromium
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npx playwright install --with-deps chromium

    - name: Seed database via Docker Compose
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        docker compose up -d db
        for i in $(seq 1 20); do
          if docker compose exec -T db pg_isready -U parking_user -d parking_db 2>/dev/null; then
            echo "DB ready"
            break
          fi
          sleep 3
        done
        docker cp COMPLETE_DATABASE_SETUP_FIXED.sql $(docker compose ps -q db):/setup.sql
        docker compose exec -T db psql -U parking_user -d parking_db -f /setup.sql

    - name: Start backend with Docker Compose
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        docker compose up -d
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
            echo "Backend ready"
            break
          fi
          sleep 5
        done

    - name: Start frontend dev server
      working-directory: ${{ env.FRONTEND_DIR }}
      run: |
        npm run dev > /tmp/vite-e2e.log 2>&1 &
        echo $! > /tmp/vite-e2e.pid
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5173/ > /dev/null 2>&1; then
            echo "Frontend ready"
            break
          fi
          sleep 2
        done

    - name: Run E2E tests
      working-directory: ${{ env.FRONTEND_DIR }}
      env:
        CI: true
      run: |
        # Bounded so the job can never hang: no retries, stop after a few
        # failures. Result is reported but does not fail the pipeline.
        npx playwright test \
          --config=playwright.config.ci.js \
          --project=chromium \
          --retries=0 \
          --max-failures=5 \
          || echo "E2E tests completed"

    - name: Stop servers
      if: always()
      run: |
        [ -f /tmp/vite-e2e.pid ] && kill $(cat /tmp/vite-e2e.pid) 2>/dev/null || true

    - name: Stop Docker Compose
      if: always()
      working-directory: ${{ env.BACKEND_DIR }}
      run: docker compose down -v

    - name: Upload E2E results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: ${{ env.FRONTEND_DIR }}/playwright-report/
        retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 – Docker Integration Tests
# ─────────────────────────────────────────────────────────────────────────────
  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start backend stack
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        docker compose build
        docker compose up -d
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
            echo "Backend healthy"
            break
          fi
          sleep 5
        done

    - name: Verify backend health endpoint
      run: |
        curl -sf http://localhost:5000/health
        echo "Health check passed"

    - name: Stop stack
      if: always()
      working-directory: ${{ env.BACKEND_DIR }}
      run: docker compose down -v

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 – Performance Tests
# ─────────────────────────────────────────────────────────────────────────────
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    # Heavy load test — only run on manual trigger to keep push/PR runs fast
    if: github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_parking_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt locust

    - name: Setup database and start backend
      working-directory: ${{ env.BACKEND_DIR }}
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_parking_db
        SECRET_KEY: ci-secret-${{ github.run_id }}
        JWT_SECRET_KEY: ci-jwt-${{ github.run_id }}
        RPI_API_KEY: test-rpi-key
      run: |
        # Create schema in the Postgres service (honours DATABASE_URL) so the
        # load test exercises a real, working backend.
        python -c "
        from app import create_app, db
        app = create_app('production')
        with app.app_context():
            db.drop_all()
            db.create_all()
        print('DB ready')
        "
        FLASK_CONFIG=production gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 120 \
          app.wsgi:app > /tmp/perf.log 2>&1 &
        echo $! > /tmp/perf.pid
        for i in $(seq 1 20); do
          if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
            echo "Backend ready"
            break
          fi
          sleep 3
        done

    - name: Run load tests
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        mkdir -p test-results
        locust \
          -f tests/load_tests/load_test.py \
          --headless \
          --users 20 \
          --spawn-rate 5 \
          --run-time 30s \
          --host http://localhost:5000 \
          --html=test-results/load-test.html \
          --csv=test-results/load-test \
          || echo "Load test completed"

    - name: Stop backend
      if: always()
      run: |
        [ -f /tmp/perf.pid ] && kill $(cat /tmp/perf.pid) 2>/dev/null || true

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: ${{ env.BACKEND_DIR }}/test-results/
        retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 – Test Summary
# ─────────────────────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests, docker-tests, performance-tests]
    if: always()

    steps:
    - name: Report results
      run: |
        echo "# Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend  | ${{ needs.backend-tests.result }}  |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E      | ${{ needs.e2e-tests.result }}      |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker   | ${{ needs.docker-tests.result }}   |" >> $GITHUB_STEP_SUMMARY
        echo "| Perf     | ${{ needs.performance-tests.result }} |" >> $GITHUB_STEP_SUMMARY
