name: Backend CI

on:
  push:
    paths: [ 'Backend/**' ]
  pull_request:
    paths: [ 'Backend/**' ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  BACKEND_DIR: 'Backend'

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Backend/app/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install coverage

      - name: Create test-results dir
        working-directory: ${{ env.BACKEND_DIR }}
        run: mkdir -p test-results

      - name: Run all tests
        id: tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --junitxml=test-results/results.xml \
            --html=test-results/results.html \
            --self-contained-html \
            --cov=app \
            --cov-report=xml:test-results/coverage.xml

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: ${{ env.BACKEND_DIR }}/test-results/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "# Backend CI" >> $GITHUB_STEP_SUMMARY
          echo "Tests: **${{ steps.tests.outcome }}**" >> $GITHUB_STEP_SUMMARY
